<header>
  <div class="left">
    <h1>Task Manager</h1>
  </div>
  <nav class="center">
    <a routerLinkActive="active" routerLink="home">Home</a>
    <a routerLinkActive="active" routerLink="addTask">Add Task</a>
    <a routerLinkActive="active" routerLink="myTasks">My Tasks</a>
  </nav>
  <nav class="right">
    @if (currentUser) {
      <button class="btn btn-outline-danger fw-bold" (click)="logout()">Logout</button>
    } @else {
      <a class="btn btn-outline-primary" routerLink="/auth/login">Login</a>
      <a class="btn btn-primary text-white" routerLink="/auth/signup">Signup</a>
    }
  </nav>
</header>
